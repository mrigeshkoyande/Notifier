# ── Cloud Build Pipeline ───────────────────────────────────────────────────────
# Builds and deploys both services to Google Cloud Run.
#
# Prerequisites:
#   1. gcloud CLI authenticated: gcloud auth login
#   2. Project set: gcloud config set project YOUR_PROJECT_ID
#   3. APIs enabled: Cloud Build, Cloud Run, Artifact Registry
#   4. Create Artifact Registry repo:
#      gcloud artifacts repositories create navix-ai \
#        --repository-format=docker --location=asia-south1
#
# Trigger manually:
#   gcloud builds submit . --config=cloudbuild.yaml \
#     --substitutions=\
#       _REGION=asia-south1,\
#       _PROJECT_ID=$(gcloud config get-value project),\
#       _VITE_FIREBASE_API_KEY=your_key,...
#
# Or connect this repo to Cloud Build triggers for CI/CD on git push.

substitutions:
  _REGION: asia-south1
  _REPO: navix-ai
  _PROJECT_ID: ${PROJECT_ID}
  # Firebase env vars (set in Cloud Build trigger substitutions — NOT hardcoded here)
  _VITE_FIREBASE_API_KEY: ''
  _VITE_FIREBASE_AUTH_DOMAIN: ''
  _VITE_FIREBASE_PROJECT_ID: ''
  _VITE_FIREBASE_STORAGE_BUCKET: ''
  _VITE_FIREBASE_MESSAGING_SENDER_ID: ''
  _VITE_FIREBASE_APP_ID: ''
  _VITE_FIREBASE_MEASUREMENT_ID: ''
  # URL of the deployed backend Cloud Run service (set after first backend deploy)
  _VITE_BACKEND_URL: ''

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # ── Step 1: Build the Python Backend image ─────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-backend
    dir: 'Assignment-notifier-/python-backend'
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/assignment-notifier-backend:$SHORT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/assignment-notifier-backend:latest'
      - '.'

  # ── Step 2: Push the Backend image ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-backend
    waitFor: ['build-backend']
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/assignment-notifier-backend'

  # ── Step 3: Deploy Backend to Cloud Run ────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-backend
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - assignment-notifier-backend
      - '--image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/assignment-notifier-backend:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=FLASK_DEBUG=false,BACKEND_BASE_URL=${_VITE_BACKEND_URL}'

  # ── Step 4: Build the Frontend image ───────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-frontend
    dir: 'Assignment-notifier-/test-vite-app'
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/assignment-notifier-frontend:$SHORT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/assignment-notifier-frontend:latest'
      - '--build-arg=VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}'
      - '--build-arg=VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg=VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}'
      - '--build-arg=VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg=VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg=VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}'
      - '--build-arg=VITE_FIREBASE_MEASUREMENT_ID=${_VITE_FIREBASE_MEASUREMENT_ID}'
      - '--build-arg=VITE_BACKEND_URL=${_VITE_BACKEND_URL}'
      - '.'

  # ── Step 5: Push the Frontend image ────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-frontend
    waitFor: ['build-frontend']
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/assignment-notifier-frontend'

  # ── Step 6: Deploy Frontend to Cloud Run ───────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-frontend
    waitFor: ['push-frontend']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - assignment-notifier-frontend
      - '--image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/assignment-notifier-frontend:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/assignment-notifier-backend:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/assignment-notifier-frontend:$SHORT_SHA'
