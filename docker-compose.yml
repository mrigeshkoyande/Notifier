# ── Local Development with Docker Compose ─────────────────────────────────────
# Mirrors the GCR setup locally so you can test both services together.
#
# Usage:
#   1. Copy test-vite-app/.env.example → test-vite-app/.env  (fill in Firebase creds)
#   2. docker compose up --build
#   3. Frontend: http://localhost:8080
#      Backend:  http://localhost:5000/health

services:
  # ── Python Flask Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
    container_name: navix-backend
    ports:
      - "5000:8080"          # Map host:5000 → container:8080
    environment:
      PORT: "8080"
      FLASK_DEBUG: "false"
      BACKEND_BASE_URL: "http://localhost:5000"
    volumes:
      # Mount local folders so captured data persists across container restarts
      - ./python-backend/captured_images:/app/captured_images
      - ./python-backend/attendance_records:/app/attendance_records
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── React + Vite Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./test-vite-app
      dockerfile: Dockerfile
      args:
        # Reads from test-vite-app/.env at build time via docker compose --env-file
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_BACKEND_URL: "http://localhost:5000"
    container_name: navix-frontend
    ports:
      - "8080:8080"           # Frontend accessible at http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# Load env vars from the frontend .env file for the build args above
env_file:
  - ./test-vite-app/.env
