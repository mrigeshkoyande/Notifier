# CI workflow — builds and lints the React/Vite frontend
# Runs on push and PR to main

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Opt into Node.js 24 runtime for actions to silence deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false        # Let all matrix jobs run even if one fails
      matrix:
        node-version: [20.x, 22.x]   # 18.x is EOL — removed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'test-vite-app/package-lock.json'

      - name: Install dependencies
        working-directory: ./test-vite-app
        run: npm ci

      - name: Build application
        working-directory: ./test-vite-app
        run: npm run build

      - name: Run linter
        working-directory: ./test-vite-app
        run: npm run lint
        continue-on-error: true
